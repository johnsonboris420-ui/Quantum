kind = "web"
previewPath = "/mandelbulb/"
title = "4D Mandelbulb Explorer"
version = "1.0.0"
id = "artifacts/mandelbulb"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/mandelbulb/" ]
localPort = 25882

[services.development]
run = "pnpm --filter @workspace/mandelbulb run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mandelbulb", "run", "build" ]
publicDir = "artifacts/mandelbulb/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25882"
BASE_PATH = "/mandelbulb/"
